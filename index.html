<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasmid Preparation Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    background: #eef2f5;
    color: #2c3e50;
  }

  header {
    background: #1f3a5f;
    color: white;
    padding: 18px;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 22px;
  }

  header p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.85;
  }

  .container {
    max-width: 850px;
    margin: 15px auto;
    padding: 15px;
  }

  .row {
    display: grid;
    grid-template-columns: 2fr 2fr auto;
    gap: 10px;
    padding: 12px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    margin-bottom: 12px;
    align-items: center;
  }

  @media (max-width: 768px) {
    .row {
      grid-template-columns: 1fr;
    }

    select, input, .delete, .result {
      width: 100%;
      box-sizing: border-box;
    }
  }

  select, input {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
  }

  input.invalid {
    border-color: #e74c3c;
    background: #fdecea;
  }

  .result {
    grid-column: span 3;
    font-size: 14px;
    font-weight: 500;
  }

  .result strong {
    color: #1f3a5f;
  }

  .delete {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
  }

  button {
    border: none;
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 500;
  }

  .primary { background: #2ecc71; color: white; }
  .secondary { background: #3498db; color: white; }
  .export { background: #8e44ad; color: white; }

  footer {
    text-align: center;
    font-size: 12px;
    margin-top: 20px;
    color: #7f8c8d;
    padding-bottom: 15px;
  }

  .global-box {
    margin-bottom: 15px;
    text-align: center;
  }

  .global-box select {
    max-width: 300px;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>Plasmid Preparation Calculator</h1>
  <p>Molecular Biology Utility Tool</p>
</header>

<div class="container">

  <!-- GLOBAL PRESET SELECTOR -->
  <div class="global-box">
    <label><strong>Global Preset (applies to new rows):</strong></label><br>
    <select id="globalPreset"></select>
  </div>

  <div id="container"></div>

  <div class="controls">
    <button class="primary" onclick="addRow()">+ Add Reaction</button>
    <button class="secondary" onclick="saveData()">Save</button>
    <button class="secondary" onclick="loadData()">Load</button>
    <button class="export" onclick="exportExcel()">Export Excel</button>
  </div>
</div>

<footer>
  For research use only • Verify all values before experimental use
</footer>

<script>
const presets = [
  { label: "1.2 μg / 40 μl", ug: 1.2, totalVol: 40 },
  { label: "1.8 μg / 60 μl", ug: 1.8, totalVol: 60 },
  { label: "2.4 μg / 80 μl", ug: 2.4, totalVol: 80 },
  { label: "3.0 μg / 100 μl", ug: 3.0, totalVol: 100 }
];

let globalPresetIndex = 0;

// Populate global preset dropdown
const globalPresetSelect = document.getElementById("globalPreset");
presets.forEach((p, i) => {
  const option = document.createElement("option");
  option.value = i;
  option.textContent = p.label;
  globalPresetSelect.appendChild(option);
});

globalPresetSelect.addEventListener("change", (e) => {
  globalPresetIndex = e.target.value;
});

function addRow(data = null) {
  const container = document.getElementById("container");
  const row = document.createElement("div");
  row.className = "row";

  const select = document.createElement("select");
  presets.forEach((p, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = p.label;
    select.appendChild(option);
  });

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "DNA Concentration (ng/μl)";

  const deleteBtn = document.createElement("button");
  deleteBtn.textContent = "Delete";
  deleteBtn.className = "delete";
  deleteBtn.onclick = () => row.remove();

  const result = document.createElement("div");
  result.className = "result";

  // Apply saved data OR global preset
  if (data) {
    select.value = data.preset;
    input.value = data.value;
  } else {
    select.value = globalPresetIndex;
  }

  function calculate() {
    const preset = presets[select.value];
    const concentration = parseFloat(input.value);

    if (!concentration || concentration <= 0) {
      input.classList.add("invalid");
      result.innerHTML = "Enter valid DNA concentration";
      return;
    }

    input.classList.remove("invalid");

    const requiredNg = preset.ug * 1000;
    const plasmidVol = requiredNg / concentration;
    const waterVol = preset.totalVol - plasmidVol;

    if (waterVol < 0) {
      result.innerHTML = "⚠️ Volume exceeds total reaction volume";
      return;
    }

    result.innerHTML = `<strong>Plasmid:</strong> ${plasmidVol.toFixed(2)} μl &nbsp; | &nbsp; <strong>Nuclease-free Water:</strong> ${waterVol.toFixed(2)} μl`;
  }

  select.onchange = calculate;
  input.oninput = calculate;

  row.appendChild(select);
  row.appendChild(input);
  row.appendChild(deleteBtn);
  row.appendChild(result);

  container.appendChild(row);
  calculate();
}

function saveData() {
  const rows = document.querySelectorAll(".row");
  const data = [];
  rows.forEach(row => {
    data.push({
      preset: row.querySelector("select").value,
      value: row.querySelector("input").value
    });
  });
  localStorage.setItem("plasmidData", JSON.stringify(data));
  alert("Saved successfully");
}

function loadData() {
  const container = document.getElementById("container");
  container.innerHTML = "";
  const data = JSON.parse(localStorage.getItem("plasmidData"));
  if (!data) return;
  data.forEach(d => addRow(d));
}

function exportExcel() {
  const rows = document.querySelectorAll(".row");
  const data = [];

  rows.forEach((row, i) => {
    const preset = presets[row.querySelector("select").value];
    const concentration = parseFloat(row.querySelector("input").value);

    if (!concentration || concentration <= 0) return;

    const plasmidVol = (preset.ug * 1000) / concentration;
    const waterVol = preset.totalVol - plasmidVol;

    data.push({
      Reaction: i + 1,
      Preset: preset.label,
      Concentration: concentration,
      Plasmid_uL: plasmidVol.toFixed(2),
      Water_uL: waterVol.toFixed(2)
    });
  });

  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Results");
  XLSX.writeFile(wb, "plasmid_results.xlsx");
}

addRow();
</script>

</body>
</html>
