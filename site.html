<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plasmid Calculator</title>

<!-- SheetJS for Excel export -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    padding: 15px;
    background: #f4f6f8;
    margin: 0;
  }

  h2 {
    text-align: center;
  }

  .container {
    max-width: 900px;
    margin: auto;
  }

  /* Desktop layout */
  @media (min-width: 768px) {
    .row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 3fr;
      align-items: center;
    }
  }

  /* Mobile layout */
  @media (max-width: 767px) {
    .row {
      display: flex;
      flex-direction: column;
    }
  }

  .row {
    gap: 10px;
    margin-bottom: 12px;
    padding: 12px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  select, input {
    padding: 8px;
    width: 100%;
  }

  input.invalid {
    border: 2px solid red;
    background: #ffe6e6;
  }

  .result {
    font-size: 14px;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 15px;
  }

  button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .add { background: #2ecc71; color: white; }
  .save { background: #3498db; color: white; }
  .delete { background: #e74c3c; color: white; }
  .export { background: #9b59b6; color: white; }
</style>
</head>
<body>

<div class="container">
<h2>Plasmid Calculator</h2>
<div id="container"></div>

<div class="buttons">
  <button class="add" onclick="addRow()">+ Add Row</button>
  <button class="save" onclick="saveData()">Save</button>
  <button class="save" onclick="loadData()">Load</button>
  <button class="export" onclick="exportExcel()">Export Excel</button>
</div>
</div>

<script>
const presets = [
  { label: "1.2μg / 40μl", ug: 1.2, totalVol: 40 },
  { label: "1.8μg / 60μl", ug: 1.8, totalVol: 60 },
  { label: "2.4μg / 80μl", ug: 2.4, totalVol: 80 },
  { label: "3μg / 100μl", ug: 3.0, totalVol: 100 }
];

function addRow(data = null) {
  const container = document.getElementById("container");

  const row = document.createElement("div");
  row.className = "row";

  const select = document.createElement("select");
  presets.forEach((p, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = p.label;
    select.appendChild(option);
  });

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "ng/μl";

  const delBtn = document.createElement("button");
  delBtn.textContent = "Delete";
  delBtn.className = "delete";
  delBtn.onclick = () => row.remove();

  const result = document.createElement("div");
  result.className = "result";

  if (data) {
    select.value = data.preset;
    input.value = data.value;
  }

  function calculate() {
    const preset = presets[select.value];
    const concentration = parseFloat(input.value);

    if (!concentration || concentration <= 0) {
      input.classList.add("invalid");
      result.textContent = "Enter valid concentration";
      return;
    }

    input.classList.remove("invalid");

    const requiredNg = preset.ug * 1000;
    const plasmidVol = requiredNg / concentration;
    const waterVol = preset.totalVol - plasmidVol;

    if (waterVol < 0) {
      result.textContent = "⚠️ Volume exceeds total";
      return;
    }

    result.textContent = `Plasmid: ${plasmidVol.toFixed(2)} μl | H₂O: ${waterVol.toFixed(2)} μl`;
  }

  select.onchange = calculate;
  input.oninput = calculate;

  row.appendChild(select);
  row.appendChild(input);
  row.appendChild(delBtn);
  row.appendChild(result);

  container.appendChild(row);

  calculate();
}

function saveData() {
  const rows = document.querySelectorAll(".row");
  const data = [];

  rows.forEach(row => {
    data.push({
      preset: row.querySelector("select").value,
      value: row.querySelector("input").value
    });
  });

  localStorage.setItem("plasmidData", JSON.stringify(data));
  alert("Saved!");
}

function loadData() {
  const container = document.getElementById("container");
  container.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("plasmidData"));
  if (!data) return;

  data.forEach(d => addRow(d));
}

function exportExcel() {
  const rows = document.querySelectorAll(".row");
  const data = [];

  rows.forEach((row, index) => {
    const presetIndex = row.querySelector("select").value;
    const preset = presets[presetIndex];
    const concentration = parseFloat(row.querySelector("input").value);

    if (!concentration || concentration <= 0) return;

    const requiredNg = preset.ug * 1000;
    const plasmidVol = requiredNg / concentration;
    const waterVol = preset.totalVol - plasmidVol;

    data.push({
      Row: index + 1,
      Preset: preset.label,
      "Concentration (ng/μl)": concentration,
      "Plasmid (μl)": plasmidVol.toFixed(2),
      "H2O (μl)": waterVol.toFixed(2)
    });
  });

  if (data.length === 0) {
    alert("No valid data to export");
    return;
  }

  const worksheet = XLSX.utils.json_to_sheet(data);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Results");

  XLSX.writeFile(workbook, "plasmid_calculations.xlsx");
}

// Initial row
addRow();
</script>

</body>
</html>
